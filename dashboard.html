<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Expense Tracker</title>

  <link rel="stylesheet" href="index.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <div>
      <h1>Expense Tracker 🎓</h1>
      <p>Track your money. Build your future.</p>
    </div>
  </header>

  <!-- DASHBOARD -->
  <section class="dashboard">

    <div class="card balance">
      <p>Available Balance</p>
      <h2 id="balance">₹0</h2>
    </div>

    <div class="card income">
      <p>Total Added</p>
      <h2 id="income">₹0</h2>
    </div>

    <div class="card expense">
      <p>Total Spent</p>
      <h2 id="expense">₹0</h2>
    </div>

  </section>

  <!-- INPUT SECTION -->
  <div class="grid">

    <!-- ADD BALANCE -->
    <div class="panel">
      <h2>Add Balance</h2>

      <input type="number" id="money" placeholder="Enter amount" />

      <button onclick="addMoney()">Add Balance</button>
    </div>

    <!-- ADD EXPENSE -->
    <div class="panel">
      <h2>New Expense</h2>

      <input type="number" id="amount" placeholder="Amount" /><br>
<label for="expenseDate">Select date</label>
      <input type="date" id="expenseDate" />
<br> <label for="expenseDate">Select date</label>
      <select id="category">
        <option></option>
        <option> Food</option>
        <option> Fees</option>
        <option> Travel</option>
        <option> Shopping</option>
        <option> Entertainment</option>
        <option> Other</option>
      </select>

      <input id="note" placeholder="What was it for?" />

      <button onclick="addExpense()">Save Expense</button>
    </div>

  </div>

  <!-- SAVINGS GOAL -->
  <div class="panel">
    <div class="goal-title">
      <h2>Spending Progress</h2>
      <span id="goalText">0%</span>
    </div>

    <div class="progress">
      <div id="progressBar"></div>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div class="panel">
    <h2>Recent Activity</h2>

    <div id="transactions">
      <p class="empty">No transactions yet</p>
    </div>
  </div>

  <!-- RESET -->
  <div class="panel">
    <h2>Reset Data</h2>

    <button onclick="resetData()">Reset All Data</button>
  </div>

</div>

<script src="index.js"></script>

</body>
</html>
